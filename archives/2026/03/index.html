<!-- 初始化模型 + 固定大小 + 居中 + 拖动 -->
<script>
  // 初始化模型
  initWidget({
    waifuPath: "https://cdn.jsdelivr.net/gh/12-qwaszx-12/xinnong@main/xinnong_6.model3.json",
    scale: 0.25 // 自定义模型大小
  });

  setTimeout(() => {
    const canvas = document.getElementById("live2d");
    if (!canvas) return;

    // ----------------- 固定大小 + 居中 -----------------
    const canvasWidth = canvas.width * 0.25;   // scale 与 initWidget 一致
    const canvasHeight = canvas.height * 0.25;

    canvas.style.position = "fixed";
    canvas.style.left = (window.innerWidth - canvasWidth) / 2 + "px";
    canvas.style.top = (window.innerHeight - canvasHeight) / 2 + "px";
    canvas.style.transform = "none";  // 不使用 translate
    canvas.style.cursor = "grab";
    canvas.style.touchAction = "none";
    canvas.style.zIndex = "9999";

    // ----------------- 拖动 -----------------
    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    canvas.addEventListener('mousedown', e => {
      dragging = true;
      canvas.style.cursor = 'grabbing';
      const rect = canvas.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
    });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      canvas.style.left = e.clientX - offsetX + "px";
      canvas.style.top = e.clientY - offsetY + "px";
    });

    window.addEventListener('mouseup', e => {
      dragging = false;
      canvas.style.cursor = 'grab';
    });

    // ----------------- 刷新或窗口缩放 -----------------
    window.addEventListener('resize', () => {
      // 不改变大小，只重新居中初始位置
      if (!dragging) {
        canvas.style.left = (window.innerWidth - canvasWidth) / 2 + "px";
        canvas.style.top = (window.innerHeight - canvasHeight) / 2 + "px";
      }
    });

  }, 500); // 延迟确保模型加载完成
</script>
